name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: HACS validation
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Hassfest
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b

  repository:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # actions/setup-python v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - name: Install repository check dependencies
        run: python -m pip install "aiohttp>=3.13.5,<4" "mypy>=1.13,<2" "pytest-homeassistant-custom-component>=0.13.332,<0.14" "ruff>=0.13,<1"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run deprecation guard
        run: python scripts/check_deprecations.py

      - name: Run integration checks
        run: python scripts/check_integration.py

      - name: Run type checks
        run: python scripts/check_typing.py

      - name: Run Ruff
        run: python -m ruff check custom_components/stiebel_dhe_connect tests scripts
