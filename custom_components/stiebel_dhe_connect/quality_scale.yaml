rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      Entities receive updates from the shared client callbacks and do not
      subscribe to per-entity external events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info: todo
  discovery: done
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      Each config entry represents one physical DHE device; additional devices
      are added as separate config entries.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: |
      The integration uses reauthentication and an explicit repair-pairing
      button; it does not currently create Home Assistant Repairs issues.
  stale-devices:
    status: exempt
    comment: |
      The integration represents one explicitly configured device per config
      entry. Removing the config entry removes the Home Assistant device.

  # Platinum
  async-dependency:
    status: exempt
    comment: |
      There is no external communication library; the local protocol client is
      implemented inside the integration.
  inject-websession:
    status: exempt
    comment: |
      There is no external communication library that accepts a web session.
  strict-typing: todo
