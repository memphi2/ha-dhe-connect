search_weather_location:
  name: Search weather location
  description: Search DHE weather locations by city/name and country ID. Results are exposed on the weather entity attributes.
  fields:
    entry_id:
      required: false
      name: Config entry ID
      description: Optional. Required when multiple Stiebel DHE Connect devices are configured.
      selector:
        text:
    name:
      required: true
      name: Name
      description: City or location name to search for.
      selector:
        text:
    country_id:
      required: true
      name: Country ID
      description: DHE weather country ID, for example 143 for USA or 34 for Germany.
      selector:
        number:
          min: 1
          max: 9999
          mode: box

toggle_weather_favorite:
  name: Toggle weather favorite
  description: Toggle a DHE weather favorite from a search result, location ID or a fresh name/country search. The DHE uses the same command to add and remove favorites.
  fields:
    entry_id:
      required: false
      name: Config entry ID
      description: Optional. Required when multiple Stiebel DHE Connect devices are configured.
      selector:
        text:
    name:
      required: false
      name: Name
      description: Optional city or location name. When set, the integration searches first and toggles the selected result.
      selector:
        text:
    country_id:
      required: false
      name: Country ID
      description: Required when name is used. For example 143 for USA or 34 for Germany.
      selector:
        number:
          min: 1
          max: 9999
          mode: box
    result_number:
      required: false
      name: Result number
      description: One-based search result number to toggle. Defaults to 1.
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    location_id:
      required: false
      name: Location ID
      description: Optional exact DHE LocationId from the weather attributes. When set, it is preferred over result number.
      selector:
        text:

select_weather_location:
  name: Select weather location
  description: Select the active DHE weather location from a search result, favorite, exact LocationId or a fresh name/country search.
  fields:
    entry_id:
      required: false
      name: Config entry ID
      description: Optional. Required when multiple Stiebel DHE Connect devices are configured.
      selector:
        text:
    name:
      required: false
      name: Name
      description: Optional city or location name. When set, the integration searches first and selects the chosen result.
      selector:
        text:
    country_id:
      required: false
      name: Country ID
      description: Required when name is used. For example 143 for USA or 34 for Germany.
      selector:
        number:
          min: 1
          max: 9999
          mode: box
    result_number:
      required: false
      name: Result number
      description: One-based search result number to select. Defaults to 1.
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    location_id:
      required: false
      name: Location ID
      description: Optional exact DHE LocationId from the weather attributes or protocol log. When set, it is preferred over result number.
      selector:
        text:
